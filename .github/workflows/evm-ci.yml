name: EVM CI

on:
  pull_request:
    paths:
      - "contracts/**"
      - "scripts/**"
      - "test/**"
      - "hardhat.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/evm-ci.yml"
  push:
    branches:
      - main
    paths:
      - "contracts/**"
      - "scripts/**"
      - "test/**"
      - "hardhat.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/evm-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test
