name: EVM CI

on:
  pull_request:
    paths:
      - "smart-contracts/**"
      - ".github/workflows/evm-ci.yml"
  push:
    branches:
      - main
    paths:
      - "smart-contracts/**"
      - ".github/workflows/evm-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: smart-contracts/package-lock.json
      - run: npm ci
      - run: npm test

